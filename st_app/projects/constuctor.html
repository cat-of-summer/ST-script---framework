<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор</title>
    <script src="st_app.js"></script>
</head>
<body>

    <style>
        section {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;

            st-app[\:columns="1"] { grid-column: span 1; }
            st-app[\:columns="2"] { grid-column: span 2; }
            st-app[\:columns="3"] { grid-column: span 3; }
            st-app[\:columns="4"] { grid-column: span 4; }
            st-app[\:columns="5"] { grid-column: span 5; }
            st-app[\:columns="6"] { grid-column: span 6; }
            st-app[\:columns="7"] { grid-column: span 7; }
            st-app[\:columns="8"] { grid-column: span 8; }
            st-app[\:columns="9"] { grid-column: span 9; }
            st-app[\:columns="10"] { grid-column: span 10; }

            div {
                display: flex;
            }
        }
    </style>

    <section>
        <st-app :data='{"name":"John","age":30,"address":{"city":"New York"}}' :direction="column" :columns="5">
            <div style="flex-direction: {{ direction }};">
                <input type="text" #model="data.name">
                <input type="text" #model="data.age">
                <input type="text" #model="data.address.city">
                <select #model="direction">
                    <option value="column">Column</option>
                    <option value="row">Row</option>
                </select>
                <input #show="direction === 'column'" type="range" min="1" max="10" #model="columns"/>
            </div>
        </st-app>
        <st-app :data='{"name":"John","age":30,"address":{"city":"New York"}}' :direction="column" :columns="5">
            <div style="flex-direction: {{ direction }};">
                <input type="text" #model="data.name">
                <input type="text" #model="data.age">
                <input type="text" #model="data.address.city">
                <select #model="direction">
                    <option value="column">Column</option>
                    <option value="row">Row</option>
                </select>
                <input #show="direction === 'column'" type="range" min="1" max="10" #model="columns"/>
            </div>
        </st-app>
    </section>


</body>
</html>
